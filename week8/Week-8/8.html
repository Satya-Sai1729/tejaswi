<!DOCTYPE html>
<html>
    <head>
        <style>
            .container{
                text-align:center;
                display:flex;
                justify-content:center;
                align-items:center;
                gap:10px;
                flex-direction:column;
            }
            .ball{
                width:200px;
                height:200px;
                border-radius:50%;
                position: relative;
                animation-name:ball;
                animation-delay:3s;
                animation-duration:5s;
                animation-iteration-count:infinite;
                background-color:rgb(145, 8, 224);

            }
            @keyframes ball{
                0% {lft:0px;top:0px;}
                25% {lft:200px;top:0px; background-color: blue;}
                50%{lft:200px;top:200px;background-color:rgb(28, 136, 224);}
                75%{lft: 0px;top:200px;background-color: rgb(15, 219, 226);}
                100%{lft:0px;top:0px;background-color: rgb(10, 241, 153);}
            }
            body{
                background-image:url(canvas.avif);
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                margin:0;
            }

            .box{
                padding: 20px;
                border: 3px solid black; 
                width:200px;
                height:400px
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 style="color:rgb(233, 218, 10);font-size: xx-large;border: 3px solid dashed black;"><i>Bouncing Ball</i></h1>
            <p style="font-size: x-large;">Observe the movement of the ball</p>
            <p style="font-size: x-large;">This animation shows vertical movement using CSS</p>
            <div class="box">
                <div class="ball"></div>
            </div>
        </div>
    </body>
</html>
