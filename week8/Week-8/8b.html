<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                background-image:url(pink.jfif);
                background-position:center;
                background-size:cover;
                background-repeat:no-repeat;
                display:flex;
                justify-content:center;
                align-items:center;
                height:100vh;
                margin:0;
            }
            .container{
                text-align:center;
                display:flex;
                justify-content:center;
                align-items:center;
                gap:10px;
                flex-direction:column;
            }
            .square{
                width:200px;
                height:200px;
                background-color:rgba(243, 8, 8, 0.486);
                position:relative;
                animation-name:myanimation;
                animation-delay:3s;
                animation-duration:5s;
                animation-iteration-count:infinite;
                margin-top:20px;
                border:3px solid black;
            }
            @keyframes myanimation{
                0%{lft:0px;top:0px;transform:rotate(0deg);}
                100% {lft:0px;top:0px;transform:rotate(360deg);}
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1 style="border: 3px dashed black;color:rgb(32, 10, 224);font-size:xx-large;">Infinite Rotating Square</h1>
            <p style="font-size:x-large">Watch the square spin endlessy with smooth animation</p>
            <p style="font-size:x-large">This square rotates 360 degrees continuosly using CSS animation.<br>It demonstrates how we can create smooth
                 motion effects on webpages</p>
            <div class="square"></div>
        </div>
        
    </body>
</html>
