<!DOCTYPE html>
<html>
    <head>
        <title>Forms</title>
    </head>
    <body>
        <h1 style="text-align: center;border: 3px solid black;">College Admission Registration</h1>
        <form>
            <Table border="2" cellspacing="0" cellpadding="6" align="center" style="width: 700;height=1000">
                <tr>
                <th><label for="name">Full Name</label></th>
                <td><input type="text" id="name"></td>
                </tr>
                <tr>
                <th><label for="email">Email</label></th>
                <td><input type="text" id="email"></td>
                </tr>
                <th><label for="num">Phone Number</label></th>
                <td><input type="text" id="num"></td>
                <tr>
                <th>Gender</label></th>
                <td>
                    <input type="radio" id="M">
                    <label for="M">Male</label>
                    <input type="radio" id="f">
                    <label for="f">Female</label>
                    <input type="radio" id="o">
                    <label for="o">Others</label>
                </td>
                </tr>

                  <tr>
                        <td><label for="Course">Course</label></td>
                        <td><select name="Course">
                            <option value="B">B.tech</option>
                            <option value="M">MBA</option>
                            <option value="P">Pharmacy</option>
                            <option value="T">M.Tech</option>
                            <option value="C">B.com</option>
                            <option value="A">BA</option>
                            <option value="D">Diploma</option>

                            </select>
                        </td>
        
                    </tr>

                   <tr>
                    <td>Hobbies</td>
                    <td>
                        <input type="checkbox" id="h1" name="h1" value="Hobbies">
                        <label for="h1">Sports</label>
                        <input type="checkbox" id="h2" name="h2" value="Hobbies">
                        <label for="h2">Music</label>
                        <input type="checkbox" id="h3" name="h3" value="Hobbies">
                        <label for="h3">Reading</label>
                    </td>
                   </tr>

                   <tr>
                    <td><label for="Dob">Date of Birth:</label></td>
                    <td>
                        <input type="date" name="dob">
                    </td>
                   </tr>

                   <tr>
                    <td><label for="Uplaod certificates">Upload certificates:</label></td>
                    <td>
                        <input type="file" name="myfile">
                    </td>
                   </tr>

                   <tr>
                    <td><label for="adress">Address</label></td>
                    <td><textarea name="address" rows="5" cols="30"></textarea></td>
                   </tr>

                   <tr>
                    <td colspan="2" align="center">
                        <input type="submit" name="submit">
                        <input type="reset" name="reset">                    
                    </td>
                   </tr>


            </Table>
        </form>
    </body>
</html>
